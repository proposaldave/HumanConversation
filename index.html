<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./assets/human-conversation-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta
      name="description"
      content="Today, Human Conversation helps community builders choose which players to talk to, what to ask, and how to shape the next experience."
    />
    <meta property="og:title" content="Human Conversation" />
    <meta
      property="og:description"
      content="Today, Human Conversation helps community builders choose which players to talk to, what to ask, and how to shape the next experience."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://humanconversation.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#f3ead8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,650&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Human Conversation</title>
    <style>
      :root {
        color: #1a1612;
        background: #f3ead8;
        font-family: Manrope, Inter, system-ui, sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        background: #f3ead8;
      }

      a {
        color: inherit;
        -webkit-tap-highlight-color: transparent;
      }

      .page {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        isolation: isolate;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.38), transparent 42%),
          radial-gradient(circle at 92% 92%, rgba(200, 70, 44, 0.11), transparent 26%),
          #f3ead8;
      }

      .page::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image:
          radial-gradient(circle, rgba(184, 149, 74, 0.16) 0.65px, transparent 0.8px),
          radial-gradient(circle, rgba(255, 255, 255, 0.48) 0.65px, transparent 0.8px);
        background-position:
          0 0,
          3px 3px;
        background-size: 6px 6px;
        opacity: 0.52;
      }

      header {
        position: relative;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: min(100% - 48px, 1060px);
        margin: 0 auto;
        padding: 28px 0;
      }

      .brand {
        display: inline-flex;
        gap: 12px;
        align-items: center;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 800;
      }

      .mark {
        display: inline-flex;
        width: 42px;
        height: 42px;
        align-items: center;
        justify-content: center;
      }

      .mark img {
        display: block;
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      main {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        width: min(100% - 48px, 1060px);
        min-height: calc(100vh - 92px);
        margin: 0 auto;
        padding: 120px 0 140px;
      }

      h1 {
        max-width: 1040px;
        margin: 0;
        font-family: Manrope, Inter, system-ui, sans-serif;
        font-size: clamp(3.35rem, 4.85vw, 5.2rem);
        font-weight: 800;
        line-height: 1;
        letter-spacing: 0;
      }

      .lede {
        max-width: 690px;
        margin: 24px 0 0;
        color: rgba(26, 22, 18, 0.64);
        font-size: clamp(1.2rem, 1.65vw, 1.4rem);
        font-weight: 800;
        line-height: 1.38;
      }

      .product-name {
        color: #4f7fbf;
        font-family: Fraunces, Georgia, serif;
        font-weight: 650;
        white-space: nowrap;
      }

      .contact {
        width: min(100%, 520px);
        margin-top: 34px;
      }

      .contact label {
        display: block;
        margin-bottom: 12px;
        color: rgba(26, 22, 18, 0.72);
        font-size: 0.95rem;
        font-weight: 800;
      }

      .contact-row {
        display: flex;
        gap: 10px;
      }

      .contact input[type="email"] {
        min-width: 0;
        flex: 1;
        border: 1px solid rgba(26, 22, 18, 0.2);
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.54);
        color: #1a1612;
        padding: 15px 16px;
        font: inherit;
        font-weight: 700;
        outline: none;
      }

      .contact input[type="email"]::placeholder {
        color: rgba(26, 22, 18, 0.48);
      }

      .contact input[type="email"]:focus {
        border-color: #5b8fd4;
      }

      .contact button {
        border: 0;
        border-radius: 7px;
        background: #5b8fd4;
        color: #1a1612;
        padding: 15px 18px;
        cursor: pointer;
        font: inherit;
        font-size: 0.98rem;
        font-weight: 800;
      }

      .contact button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .direct-email {
        margin: 14px 0 0;
        color: rgba(26, 22, 18, 0.58);
        font-size: 0.94rem;
        font-weight: 700;
      }

      .direct-email a {
        color: #4f7fbf;
        text-decoration-thickness: 2px;
        text-underline-offset: 3px;
      }

      .status {
        min-height: 1.5rem;
        margin: 12px 0 0;
        color: rgba(26, 22, 18, 0.64);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .hp-field {
        position: absolute;
        left: -9999px;
      }

      @media (max-width: 640px) {
        header,
        main {
          width: min(100% - 32px, 1060px);
        }

        header {
          padding-top: 20px;
        }

        h1 {
          font-size: clamp(2.75rem, 12vw, 4.4rem);
        }

        .contact-row {
          flex-direction: column;
        }

        .contact button {
          width: 100%;
        }

        .brand span:last-child {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <a class="brand" href="./" aria-label="Human Conversation home">
          <span class="mark" aria-hidden="true">
            <img src="./assets/human-conversation-mark.png" alt="" width="42" height="42" />
          </span>
          <span>Human Conversation</span>
        </a>
      </header>

      <main>
        <section>
          <h1>Community coordination happens in the conversation layer.</h1>
          <p class="lede">Today, <span class="product-name">Human Conversation</span> helps community builders choose which players to talk to, what to ask, and how to shape the next experience.</p>
          <form class="contact" id="email-capture" action="https://formsubmit.co/hello@humanconversation.com" method="post">
            <label for="email">Want in</label>
            <input type="hidden" name="_subject" value="New Human Conversation signup" />
            <input type="hidden" name="_template" value="table" />
            <input type="hidden" name="_captcha" value="false" />
            <input type="hidden" name="_url" value="https://humanconversation.com/" />
            <input class="hp-field" type="text" name="_honey" tabindex="-1" autocomplete="off" aria-hidden="true" />
            <div class="contact-row">
              <input id="email" name="email" type="email" autocomplete="email" placeholder="Email address" required />
              <button type="submit">Join the Conversation</button>
            </div>
            <p class="direct-email"><a href="mailto:hello@humanconversation.com">hello@humanconversation.com</a></p>
            <p class="status" id="form-status" role="status" aria-live="polite"></p>
          </form>
        </section>
      </main>
    </div>
    <script>
      const form = document.querySelector("#email-capture");
      const emailInput = document.querySelector("#email");
      const status = document.querySelector("#form-status");
      const button = form.querySelector("button");
      const submitEndpoint = "https://formsubmit.co/ajax/hello@humanconversation.com";

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!emailInput.validity.valid) {
          form.reportValidity();
          return;
        }

        button.disabled = true;
        button.textContent = "Joining...";
        status.textContent = "";

        try {
          const response = await fetch(submitEndpoint, {
            method: "POST",
            headers: {
              Accept: "application/json",
            },
            body: new FormData(form),
          });

          if (!response.ok) {
            throw new Error("Submission failed");
          }

          emailInput.value = "";
          button.textContent = "Joined";
          status.textContent = "You are on the list.";

          window.setTimeout(() => {
            button.disabled = false;
            button.textContent = "Join the Conversation";
          }, 2800);
        } catch (error) {
          button.disabled = false;
          button.textContent = "Join the Conversation";
          status.textContent = "Could not submit. Email hello@humanconversation.com and we will add you.";
        }
      });
    </script>
  </body>
</html>

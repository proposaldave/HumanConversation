<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./assets/human-conversation-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta
      name="description"
      content="Human Conversation tells community builders who to talk to next and how to make the conversation count."
    />
    <meta property="og:title" content="Human Conversation" />
    <meta
      property="og:description"
      content="Human Conversation tells community builders who to talk to next and how to make the conversation count."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://humanconversation.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#f3ead8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,650&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Human Conversation</title>
    <style>
      :root {
        --hc-blue: #365f99;
        --hc-accent: #58785c;
        --hc-accent-button: #a9c68f;
        color: #1a1612;
        background: #f3ead8;
        font-family: Manrope, Inter, system-ui, sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        background: #f3ead8;
      }

      a {
        color: inherit;
        -webkit-tap-highlight-color: transparent;
      }

      .page {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        isolation: isolate;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.38), transparent 42%),
          radial-gradient(circle at 92% 92%, rgba(200, 70, 44, 0.11), transparent 26%),
          #f3ead8;
      }

      .page[data-palette="sage"] {
        --hc-accent: #58785c;
        --hc-accent-button: #a9c68f;
      }

      .page[data-palette="rose"] {
        --hc-accent: #974f63;
        --hc-accent-button: #d68a9a;
      }

      .page[data-palette="plum"] {
        --hc-accent: #74527f;
        --hc-accent-button: #bd94c8;
      }

      .page::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image:
          radial-gradient(circle, rgba(184, 149, 74, 0.16) 0.65px, transparent 0.8px),
          radial-gradient(circle, rgba(255, 255, 255, 0.48) 0.65px, transparent 0.8px);
        background-position:
          0 0,
          3px 3px;
        background-size: 6px 6px;
        opacity: 0.52;
      }

      header {
        position: relative;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        width: min(100% - 48px, 1060px);
        margin: 0 auto;
        padding: 28px 0;
      }

      .brand {
        display: inline-flex;
        gap: 12px;
        align-items: center;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 800;
      }

      .palette-switcher {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .palette-button {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border: 1px solid rgba(26, 22, 18, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.42);
        color: rgba(26, 22, 18, 0.72);
        padding: 7px 10px 7px 8px;
        cursor: pointer;
        font: inherit;
        font-size: 0.78rem;
        font-weight: 800;
        line-height: 1;
      }

      .palette-button[aria-pressed="true"] {
        border-color: var(--swatch);
        color: #1a1612;
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--swatch) 20%, transparent);
      }

      .palette-swatch {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: var(--swatch);
        box-shadow: inset 0 0 0 1px rgba(26, 22, 18, 0.12);
      }

      .mark {
        position: relative;
        display: inline-block;
        width: 42px;
        height: 42px;
      }

      .mark::before,
      .mark::after {
        content: "";
        position: absolute;
        top: 11px;
        width: 21px;
        height: 18px;
        border-radius: 50% 50% 45% 45%;
        background: #1a1612;
      }

      .mark::before {
        left: 4px;
      }

      .mark::after {
        right: 4px;
      }

      .mark-accent {
        position: absolute;
        z-index: 1;
        top: 9px;
        left: 17px;
        width: 8px;
        height: 23px;
        border-radius: 999px;
        background: var(--hc-accent);
      }

      main {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        width: min(100% - 48px, 1060px);
        min-height: calc(100vh - 92px);
        margin: 0 auto;
        padding: 120px 0 140px;
      }

      h1 {
        max-width: 1040px;
        margin: 0;
        font-family: Manrope, Inter, system-ui, sans-serif;
        font-size: clamp(3.35rem, 4.85vw, 5.2rem);
        font-weight: 800;
        line-height: 1;
        letter-spacing: 0;
      }

      h1 > span {
        display: block;
      }

      .statement-lead {
        max-width: 14em;
      }

      .disconnection-word {
        color: var(--hc-blue);
      }

      .statement-step {
        width: max-content;
        max-width: 100%;
      }

      .transformation-line {
        display: flex;
        align-items: baseline;
        gap: 0.16em;
        width: max-content;
        max-width: 100%;
        color: var(--hc-accent);
      }

      .transformation-coordination {
        margin-left: 0.58em;
      }

      .transformation-community {
        margin-left: 1.16em;
      }

      .headline-arrow {
        flex: 0 0 auto;
        color: currentColor;
        font-size: 0.95em;
        font-weight: 900;
        line-height: 1;
      }

      .lede {
        max-width: 800px;
        margin: 24px 0 0;
        color: rgba(26, 22, 18, 0.64);
        font-size: clamp(1.2rem, 1.65vw, 1.4rem);
        font-weight: 800;
        line-height: 1.38;
      }

      .product-name {
        color: var(--hc-accent);
        font-family: Fraunces, Georgia, serif;
        font-weight: 650;
        white-space: nowrap;
      }

      .contact {
        width: min(100%, 520px);
        margin-top: 34px;
      }

      .contact label {
        display: block;
        margin-bottom: 12px;
        color: rgba(26, 22, 18, 0.72);
        font-size: 0.95rem;
        font-weight: 800;
      }

      .contact-row {
        display: flex;
        gap: 10px;
      }

      .contact input[type="email"] {
        min-width: 0;
        flex: 1;
        border: 1px solid rgba(26, 22, 18, 0.2);
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.54);
        color: #1a1612;
        padding: 15px 16px;
        font: inherit;
        font-weight: 700;
        outline: none;
      }

      .contact input[type="email"]::placeholder {
        color: rgba(26, 22, 18, 0.48);
      }

      .contact input[type="email"]:focus {
        border-color: var(--hc-accent-button);
      }

      .contact button {
        border: 0;
        border-radius: 7px;
        background: var(--hc-accent-button);
        color: #1a1612;
        padding: 15px 18px;
        cursor: pointer;
        font: inherit;
        font-size: 0.98rem;
        font-weight: 800;
      }

      .contact button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .direct-email {
        margin: 14px 0 0;
        color: rgba(26, 22, 18, 0.58);
        font-size: 0.94rem;
        font-weight: 700;
      }

      .direct-email a {
        color: var(--hc-accent);
        text-decoration-thickness: 2px;
        text-underline-offset: 3px;
      }

      .status {
        min-height: 1.5rem;
        margin: 12px 0 0;
        color: rgba(26, 22, 18, 0.64);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .hp-field {
        position: absolute;
        left: -9999px;
      }

      @media (max-width: 640px) {
        header,
        main {
          width: min(100% - 32px, 1060px);
        }

        header {
          padding-top: 20px;
        }

        main {
          min-height: auto;
          padding: 72px 0 64px;
          align-items: flex-start;
        }

        h1 {
          max-width: 100%;
          font-size: clamp(2.55rem, 10.6vw, 3.1rem);
          line-height: 1.03;
        }

        .statement-step,
        .transformation-line {
          width: 100%;
        }

        .transformation-coordination {
          margin-left: 0.18em;
        }

        .transformation-community {
          margin-left: 0.36em;
        }

        .lede {
          max-width: 100%;
          margin-top: 22px;
          font-size: 1.08rem;
          line-height: 1.42;
        }

        .product-name {
          white-space: normal;
        }

        .contact {
          margin-top: 32px;
        }

        .contact-row {
          flex-direction: column;
        }

        .contact button {
          width: 100%;
        }

        .brand span:last-child {
          display: none;
        }

        .palette-switcher {
          max-width: 218px;
          gap: 6px;
        }

        .palette-button {
          width: 34px;
          height: 34px;
          justify-content: center;
          padding: 0;
        }

        .palette-button span:last-child {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <a class="brand" href="./" aria-label="Human Conversation home">
          <span class="mark" aria-hidden="true">
            <span class="mark-accent"></span>
          </span>
          <span>Human Conversation</span>
        </a>
        <div class="palette-switcher" aria-label="Color options">
          <button class="palette-button" type="button" data-palette-option="sage" aria-pressed="true" style="--swatch: #58785c">
            <span class="palette-swatch" aria-hidden="true"></span>
            <span>Sage</span>
          </button>
          <button class="palette-button" type="button" data-palette-option="rose" aria-pressed="false" style="--swatch: #974f63">
            <span class="palette-swatch" aria-hidden="true"></span>
            <span>Rose</span>
          </button>
          <button class="palette-button" type="button" data-palette-option="plum" aria-pressed="false" style="--swatch: #74527f">
            <span class="palette-swatch" aria-hidden="true"></span>
            <span>Plum</span>
          </button>
        </div>
      </header>

      <main>
        <section>
          <h1 aria-label="Human conversation turns disconnection into connection, coordination, and community"><span class="statement-lead" aria-hidden="true">Human conversation turns <span class="disconnection-word">disconnection</span></span><span class="transformation-line transformation-connection" aria-hidden="true"><span class="headline-arrow">→</span><span>connection</span></span><span class="transformation-line transformation-coordination" aria-hidden="true"><span class="headline-arrow">→</span><span>coordination</span></span><span class="transformation-line transformation-community" aria-hidden="true"><span class="headline-arrow">→</span><span>community</span></span></h1>
          <p class="lede"><span class="product-name">Human Conversation</span> tells community builders who to talk to next and how to make the conversation count.</p>
          <form class="contact" id="email-capture" action="https://formsubmit.co/hello@humanconversation.com" method="post">
            <input type="hidden" name="_subject" value="New Human Conversation signup" />
            <input type="hidden" name="_template" value="table" />
            <input type="hidden" name="_captcha" value="false" />
            <input type="hidden" name="_url" value="https://humanconversation.com/" />
            <input class="hp-field" type="text" name="_honey" tabindex="-1" autocomplete="off" aria-hidden="true" />
            <div class="contact-row">
              <input id="email" name="email" type="email" autocomplete="email" placeholder="Email address" aria-label="Email address" required />
              <button type="submit">Join the Conversation</button>
            </div>
            <p class="direct-email"><a href="mailto:hello@humanconversation.com">hello@humanconversation.com</a></p>
            <p class="status" id="form-status" role="status" aria-live="polite"></p>
          </form>
        </section>
      </main>
    </div>
    <script>
      const page = document.querySelector(".page");
      const paletteButtons = Array.from(document.querySelectorAll("[data-palette-option]"));
      const paletteNames = new Set(paletteButtons.map((button) => button.dataset.paletteOption));
      const paletteFromUrl = new URLSearchParams(window.location.search).get("palette");
      let savedPalette = "";

      try {
        savedPalette = window.localStorage.getItem("humanConversationPalette") || "";
      } catch {
        savedPalette = "";
      }

      function setPalette(nextPalette) {
        const palette = paletteNames.has(nextPalette) ? nextPalette : "sage";
        page.dataset.palette = palette;
        paletteButtons.forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.paletteOption === palette));
        });
        try {
          window.localStorage.setItem("humanConversationPalette", palette);
        } catch {
          // Palette selection still works for the current page view.
        }
      }

      paletteButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setPalette(button.dataset.paletteOption);
        });
      });

      setPalette(paletteFromUrl || savedPalette || "sage");

      const form = document.querySelector("#email-capture");
      const emailInput = document.querySelector("#email");
      const status = document.querySelector("#form-status");
      const button = form.querySelector("button");
      const submitEndpoint = "https://formsubmit.co/ajax/hello@humanconversation.com";

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!emailInput.validity.valid) {
          form.reportValidity();
          return;
        }

        button.disabled = true;
        button.textContent = "Joining...";
        status.textContent = "";

        try {
          const response = await fetch(submitEndpoint, {
            method: "POST",
            headers: {
              Accept: "application/json",
            },
            body: new FormData(form),
          });

          if (!response.ok) {
            throw new Error("Submission failed");
          }

          emailInput.value = "";
          button.textContent = "Joined";
          status.textContent = "You are on the list.";

          window.setTimeout(() => {
            button.disabled = false;
            button.textContent = "Join the Conversation";
          }, 2800);
        } catch (error) {
          button.disabled = false;
          button.textContent = "Join the Conversation";
          status.textContent = "Could not submit. Email hello@humanconversation.com and we will add you.";
        }
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta name="description" content="Human Conversation." />
    <meta property="og:title" content="Human Conversation" />
    <meta property="og:description" content="Human Conversation." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://humanconversation.com/" />
    <meta property="og:image" content="https://humanconversation.com/generated/hero-background.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#050608" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,650&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Human Conversation</title>
    <style>
      :root {
        color: #f4efe4;
        background: #050608;
        font-family: Manrope, Inter, system-ui, sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        background: #050608;
      }

      a {
        color: inherit;
        -webkit-tap-highlight-color: transparent;
      }

      .page {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
      }

      .page::before {
        position: absolute;
        inset: 0;
        content: "";
        z-index: 1;
        background: linear-gradient(90deg, #050608 0%, rgba(5, 6, 8, 0.88) 52%, rgba(5, 6, 8, 0.58) 100%);
      }

      .background {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.45;
      }

      header {
        position: relative;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: min(100% - 48px, 1180px);
        margin: 0 auto;
        padding: 28px 0;
      }

      .brand {
        display: inline-flex;
        gap: 12px;
        align-items: center;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 800;
      }

      .mark {
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border: 1px solid rgba(244, 239, 228, 0.2);
        border-radius: 7px;
      }

      .mark svg {
        width: 18px;
        height: 18px;
      }

      main {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        width: min(100% - 48px, 1180px);
        min-height: calc(100vh - 92px);
        margin: 0 auto;
        padding: 64px 0 120px;
      }

      h1 {
        max-width: 820px;
        margin: 0;
        font-family: Fraunces, Georgia, serif;
        font-size: clamp(4rem, 9vw, 8rem);
        font-weight: 650;
        line-height: 0.94;
        letter-spacing: 0;
      }

      .contact {
        width: min(100%, 520px);
        margin-top: 40px;
      }

      .contact label {
        display: block;
        margin-bottom: 12px;
        color: rgba(244, 239, 228, 0.82);
        font-size: 0.95rem;
        font-weight: 800;
      }

      .contact-row {
        display: flex;
        gap: 10px;
      }

      .contact input[type="email"] {
        min-width: 0;
        flex: 1;
        border: 1px solid rgba(244, 239, 228, 0.24);
        border-radius: 7px;
        background: rgba(5, 6, 8, 0.72);
        color: #f4efe4;
        padding: 15px 16px;
        font: inherit;
        font-weight: 700;
        outline: none;
      }

      .contact input[type="email"]::placeholder {
        color: rgba(244, 239, 228, 0.52);
      }

      .contact input[type="email"]:focus {
        border-color: rgba(244, 239, 228, 0.72);
      }

      .contact button {
        border: 0;
        border-radius: 7px;
        background: #f4efe4;
        color: #050608;
        padding: 15px 18px;
        cursor: pointer;
        font: inherit;
        font-size: 0.98rem;
        font-weight: 800;
      }

      .contact button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .status {
        min-height: 1.5rem;
        margin: 12px 0 0;
        color: rgba(244, 239, 228, 0.72);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .hp-field {
        position: absolute;
        left: -9999px;
      }

      @media (max-width: 640px) {
        header,
        main {
          width: min(100% - 32px, 1180px);
        }

        header {
          padding-top: 20px;
        }

        h1 {
          font-size: clamp(3.6rem, 18vw, 5.4rem);
        }

        .contact-row {
          flex-direction: column;
        }

        .contact button {
          width: 100%;
        }

        .brand span:last-child {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <img class="background" src="./generated/hero-background.png" alt="" />
      <header>
        <a class="brand" href="./" aria-label="Human Conversation home">
          <span class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M4 11.7C4 7.5 7.6 4 12.6 4s8.4 3.5 8.4 7.7-3.5 7.7-8.4 7.7c-1.3 0-2.5-.2-3.6-.7L4.7 21l1.3-4.5A7 7 0 0 1 4 11.7Z"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <span>Human Conversation</span>
        </a>
      </header>

      <main>
        <section>
          <h1>Human Conversation</h1>
          <form class="contact" id="email-capture" action="https://formsubmit.co/hello@humanconversation.com" method="post">
            <label for="email">Want in</label>
            <input type="hidden" name="_subject" value="New Human Conversation signup" />
            <input type="hidden" name="_template" value="table" />
            <input type="hidden" name="_captcha" value="false" />
            <input type="hidden" name="_url" value="https://humanconversation.com/" />
            <input class="hp-field" type="text" name="_honey" tabindex="-1" autocomplete="off" aria-hidden="true" />
            <div class="contact-row">
              <input id="email" name="email" type="email" autocomplete="email" placeholder="Email address" required />
              <button type="submit">Join the List</button>
            </div>
            <p class="status" id="form-status" role="status" aria-live="polite"></p>
          </form>
        </section>
      </main>
    </div>
    <script>
      const form = document.querySelector("#email-capture");
      const emailInput = document.querySelector("#email");
      const status = document.querySelector("#form-status");
      const button = form.querySelector("button");
      const submitEndpoint = "https://formsubmit.co/ajax/hello@humanconversation.com";

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!emailInput.validity.valid) {
          form.reportValidity();
          return;
        }

        button.disabled = true;
        button.textContent = "Joining...";
        status.textContent = "";

        try {
          const response = await fetch(submitEndpoint, {
            method: "POST",
            headers: {
              Accept: "application/json",
            },
            body: new FormData(form),
          });

          if (!response.ok) {
            throw new Error("Submission failed");
          }

          emailInput.value = "";
          button.textContent = "Joined";
          status.textContent = "You are on the list.";

          window.setTimeout(() => {
            button.disabled = false;
            button.textContent = "Join the List";
          }, 2800);
        } catch (error) {
          button.disabled = false;
          button.textContent = "Join the List";
          status.textContent = "Could not submit. Email hello@humanconversation.com and we will add you.";
        }
      });
    </script>
  </body>
</html>
